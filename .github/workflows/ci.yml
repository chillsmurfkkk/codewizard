name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  windows-tests:
    name: Windows CMake tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Prepare vcpkg
        shell: pwsh
        run: |
          $root = $env:VCPKG_INSTALLATION_ROOT

          if (-not $root -or -not (Test-Path (Join-Path $root "vcpkg.exe"))) {
            $root = Join-Path $env:RUNNER_TEMP "vcpkg"

            if (-not (Test-Path (Join-Path $root "vcpkg.exe"))) {
              git clone https://github.com/microsoft/vcpkg.git $root
              & (Join-Path $root "bootstrap-vcpkg.bat") -disableMetrics
            }
          }

          git -C $root fetch --all --tags --force

          "VCPKG_ROOT=$root" >> $env:GITHUB_ENV
          "VCPKG_BINARY_SOURCES=clear;files,$env:GITHUB_WORKSPACE\.vcpkg-cache,readwrite" >> $env:GITHUB_ENV

      - name: Configure
        run: cmake --preset windows-msvc

      - name: Build tests
        run: cmake --build --preset windows-msvc-debug --target codewizard_tests --parallel

      - name: Run tests
        run: ctest --test-dir build/windows-msvc -C Debug --output-on-failure
